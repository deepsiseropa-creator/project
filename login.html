<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Buddy - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.login-box{
    width:360px;
    background:#fff;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.login-box h1{
    text-align:center;
    margin-bottom:10px;
    color:#2563eb;
}

.login-box p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

.input-box input:focus{
    border-color:#2563eb;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.bottom{
    text-align:center;
    margin-top:20px;
    color:#666;
}

.bottom a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}
</style>

</head>
<body>

<div class="login-box">

<h1>📚 Study Buddy</h1>

<p>Welcome Back!</p>

<form>

<div class="input-box">
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<input type="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

<div class="bottom">
<p>Don't have an account? <a href="#">Sign Up</a></p>
</div>

</div>

</body>
</html>
